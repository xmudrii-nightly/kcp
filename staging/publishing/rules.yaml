rules:
- destination: apimachinery
  branches:
  - name: new-kcp-1.33.3
    source:
      branch: main
      dirs:
      - staging/src/github.com/kcp-dev/client-go
  library: true
- destination: client-go
  branches:
  - name: kcp-1.33.3
    source:
      branch: main
      dirs:
      - staging/src/github.com/kcp-dev/client-go
    smoke-test: |
      # assumes GO111MODULE=on
      go build -mod=mod ./...
      go test -mod=mod ./...
  library: true
recursive-delete-patterns:
- '*/.gitattributes'
default-go-version: 1.24.2
skip-tags: true